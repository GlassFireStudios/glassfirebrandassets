<!doctype html>
<!-- @dsCard group="Brand" name="Brand Gradients" subtitle="Fire, Glass, and Spark — lifted from the logo" viewport="700x260" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; color: #fff; font-family: var(--font-sans); }
  .stage { padding: 24px 32px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
  .grad { height: 72px; border-radius: 6px; display: flex; align-items: flex-end; justify-content: space-between; padding: 10px 14px; box-sizing: border-box; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
  .stops { font-family: var(--font-mono); font-size: 10px; font-weight: 400; letter-spacing: 0; opacity: 0.9; text-transform: none; }
</style></head>
<body><div class="stage">
  <div class="grad" style="background: var(--gf-gradient-fire); color:#fff">
    <span>Fire</span><span class="stops">#EF404E → #EE3157 → #E50981</span>
  </div>
  <div class="grad" style="background: var(--gf-gradient-glass); color:#fff">
    <span>Glass</span><span class="stops">#00A8E4 → #178ACD → #3C5BA9</span>
  </div>
  <div class="grad" style="background: var(--gf-gradient-spark); color:#fff">
    <span>Spark</span><span class="stops">cyan → indigo → magenta → fire</span>
  </div>
</div></body></html>
