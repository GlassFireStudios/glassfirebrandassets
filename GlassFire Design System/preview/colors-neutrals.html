<!doctype html>
<!-- @dsCard group="Brand" name="Neutral Scale" subtitle="9-step grayscale, warm off-white" viewport="700x150" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; color: #fff; font-family: var(--font-sans); }
  .stage { padding: 24px 32px; box-sizing: border-box; }
  .row { display: flex; gap: 6px; }
  .step { flex: 1; height: 76px; border-radius: 4px; padding: 10px 10px; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; font-size: 10px; font-family: var(--font-mono); }
  .lbl { font-family: var(--font-sans); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
</style></head>
<body><div class="stage">
  <div class="row">
    <div class="step" style="background:#000;color:#fff;border:1px solid #2A2A30"><span class="lbl">Black</span><span>#000000</span></div>
    <div class="step" style="background:#0A0A0C;color:#fff"><span class="lbl">Ink</span><span>#0A0A0C</span></div>
    <div class="step" style="background:#1A1A1F;color:#fff"><span class="lbl">Graphite</span><span>#1A1A1F</span></div>
    <div class="step" style="background:#2A2A30;color:#fff"><span class="lbl">Iron</span><span>#2A2A30</span></div>
    <div class="step" style="background:#6E6E76;color:#fff"><span class="lbl">Steel</span><span>#6E6E76</span></div>
    <div class="step" style="background:#B8B8BE;color:#000"><span class="lbl">Fog</span><span>#B8B8BE</span></div>
    <div class="step" style="background:#E6E6E8;color:#000"><span class="lbl">Mist</span><span>#E6E6E8</span></div>
    <div class="step" style="background:#F5F5F2;color:#000"><span class="lbl">Paper</span><span>#F5F5F2</span></div>
    <div class="step" style="background:#fff;color:#000"><span class="lbl">Snow</span><span>#FFFFFF</span></div>
  </div>
</div></body></html>
