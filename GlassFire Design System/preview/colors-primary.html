<!doctype html>
<!-- @dsCard group="Brand" name="Primary Palette" subtitle="Black, Fire #EE2750, Glass #00A8E4, Paper" viewport="700x180" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-1); color: var(--fg-1); font-family: var(--font-sans); }
  .stage { padding: 28px 32px; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .swatch-row { display: flex; gap: 10px; }
  .swatch { flex: 1; height: 88px; border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
  .swatch .name { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
  .swatch .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.7; }
</style></head>
<body><div class="stage">
  <div class="swatch-row">
    <div class="swatch" style="background:#000;color:#fff;border:1px solid var(--border-soft)"><span class="name">Black</span><span class="hex">#000000</span></div>
    <div class="swatch" style="background:#EE2750;color:#fff"><span class="name">Fire</span><span class="hex">#EE2750</span></div>
    <div class="swatch" style="background:#00A8E4;color:#fff"><span class="name">Glass</span><span class="hex">#00A8E4</span></div>
    <div class="swatch" style="background:#F5F5F2;color:#0A0A0C"><span class="name">Paper</span><span class="hex">#F5F5F2</span></div>
  </div>
</div></body></html>
