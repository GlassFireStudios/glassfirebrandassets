<!doctype html>
<!-- @dsCard group="Brand" name="Semantic Colors" subtitle="Success / Warning / Danger / Info" viewport="700x130" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; color: #fff; font-family: var(--font-sans); }
  .stage { padding: 24px 32px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; box-sizing: border-box; }
  .chip { padding: 12px 14px; border-radius: 6px; display: flex; flex-direction: column; gap: 4px; }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
  .val { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; vertical-align: middle; margin-right: 8px; }
</style></head>
<body><div class="stage">
  <div class="chip" style="background:#0A0A0C; border:1px solid #2A2A30"><span class="lbl"><span class="dot" style="background:#2FBF71"></span>Success</span><span class="val">#2FBF71</span></div>
  <div class="chip" style="background:#0A0A0C; border:1px solid #2A2A30"><span class="lbl"><span class="dot" style="background:#F2B33D"></span>Warning</span><span class="val">#F2B33D</span></div>
  <div class="chip" style="background:#0A0A0C; border:1px solid #2A2A30"><span class="lbl"><span class="dot" style="background:#EE2750"></span>Danger</span><span class="val">#EE2750</span></div>
  <div class="chip" style="background:#0A0A0C; border:1px solid #2A2A30"><span class="lbl"><span class="dot" style="background:#00A8E4"></span>Info</span><span class="val">#00A8E4</span></div>
</div></body></html>
