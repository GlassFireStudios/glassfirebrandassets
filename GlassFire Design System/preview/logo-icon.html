<!doctype html>
<!-- @dsCard group="Brand" name="Icon Mark" subtitle="Gradient primary; white reverse; flat for functional use" viewport="700x170" -->
<html><head><meta charset="utf-8">
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  .stage { display: grid; grid-template-columns: repeat(4, 1fr); height: 100%; }
  .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 20px; position: relative; }
  .black { background: #000; }
  .light { background: #F5F5F2; }
  img { width: 80px; height: 80px; }
  .tag { position: absolute; bottom: 12px; left: 0; right: 0; text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; line-height: 1.3; }
  .black .tag { color: #6E6E76; }
  .light .tag { color: #8A8A90; }
  .note { color: #C99 !important; }
</style></head>
<body><div class="stage">
  <div class="cell black"><img src="../assets/logos/Icon Color.png" alt="Gradient icon on dark"><span class="tag">Gradient · Primary</span></div>
  <div class="cell light"><img src="../assets/logos/Icon Color.png" alt="Gradient icon on light"><span class="tag">Gradient · Primary</span></div>
  <div class="cell black"><img src="../assets/logos/Icon White.svg" alt="White icon"><span class="tag">White · Reverse</span></div>
  <div class="cell light"><img src="../assets/logos/Icon 2 Color.svg" alt="Flat two-color icon"><span class="tag note">Flat · Functional only</span></div>
</div></body></html>
