<!doctype html>
<!-- @dsCard group="Brand" name="Wordmark — Mono & Functional" subtitle="White reverse, 1-color black, flat 2-color (embroidery only)" viewport="700x180" -->
<html><head><meta charset="utf-8">
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  .stage { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 100%; }
  .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px; position: relative; }
  .black { background: #000; }
  .light { background: #F5F5F2; }
  img { width: 88%; max-width: 230px; height: auto; }
  .tag { position: absolute; bottom: 13px; left: 0; right: 0; text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; line-height: 1.3; }
  .black .tag { color: #6E6E76; }
  .light .tag { color: #8A8A90; }
  .note { color: #C99 !important; }
</style></head>
<body><div class="stage">
  <div class="cell black"><img src="../assets/logos/Logo White.svg" alt="White wordmark"><span class="tag">White · Reverse only</span></div>
  <div class="cell light"><img src="../assets/logos/Logo Black.svg" alt="Black wordmark"><span class="tag">Black · 1-color print</span></div>
  <div class="cell light"><img src="../assets/logos/Logo 2 Color.svg" alt="Flat two-color wordmark"><span class="tag note">Flat 2-Color · Embroidery / functional only</span></div>
</div></body></html>
