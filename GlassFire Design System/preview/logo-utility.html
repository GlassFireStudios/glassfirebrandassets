<!doctype html>
<!-- @dsCard group="Brand" name="Brand Utility Marks" subtitle="Contact asset tag, web clip, favicon" viewport="700x200" -->
<html><head><meta charset="utf-8">
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #0A0A0C; }
  .stage { display: flex; align-items: center; gap: 28px; height: 100%; padding: 28px 36px; box-sizing: border-box; }
  .asset-tag { flex: 1.4; }
  .asset-tag img { width: 100%; max-width: 360px; height: auto; }
  .small-marks { flex: 1; display: flex; gap: 18px; align-items: center; }
  .chip { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .chip img { width: 64px; height: 64px; border-radius: 14px; }
  .chip .webclip { border-radius: 16px; }
  .chip span { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #6E6E76; }
</style></head>
<body><div class="stage">
  <div class="asset-tag"><img src="../assets/logos/Asset Tag.png" alt="GlassFire asset tag — phone + email lockup"></div>
  <div class="small-marks">
    <div class="chip"><img class="webclip" src="../assets/logos/Webclip.png" alt="Web clip"><span>Web Clip</span></div>
    <div class="chip"><img src="../assets/logos/Favicon.png" alt="Favicon" style="background:#fff;"><span>Favicon</span></div>
  </div>
</div></body></html>
