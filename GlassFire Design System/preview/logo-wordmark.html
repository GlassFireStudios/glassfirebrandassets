<!doctype html>
<!-- @dsCard group="Brand" name="Wordmark" subtitle="Gradient — the always-preferred primary, on light and dark" viewport="700x200" -->
<html><head><meta charset="utf-8">
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  .stage { display: grid; grid-template-columns: 1fr 1fr; height: 100%; }
  .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 28px; position: relative; }
  .black { background: #000; }
  .light { background: #F5F5F2; }
  img { width: 80%; max-width: 320px; height: auto; }
  .tag { position: absolute; bottom: 14px; left: 0; right: 0; text-align: center; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; }
  .black .tag { color: #6E6E76; }
  .light .tag { color: #8A8A90; }
</style></head>
<body><div class="stage">
  <div class="cell light"><img src="../assets/logos/Logo Color.png" alt="GlassFire gradient on light"><span class="tag">Primary · Gradient on Light</span></div>
  <div class="cell black"><img src="../assets/logos/Logo Color.png" alt="GlassFire gradient on black"><span class="tag">Primary · Gradient on Dark</span></div>
</div></body></html>
