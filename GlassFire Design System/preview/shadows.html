<!doctype html>
<!-- @dsCard group="Brand" name="Elevation & Glow" subtitle="SM / MD / LG + fire and glass brand glows" viewport="700x180" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #F5F5F2; color: #0A0A0C; font-family: var(--font-sans); overflow: hidden; }
  .stage { padding: 28px 24px; box-sizing: border-box; display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; align-items: center; }
  .box { background: #fff; height: 80px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #6E6E76; }
  .lbl { text-align: center; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 8px; color: #6E6E76; }
  .item { display: flex; flex-direction: column; }
</style></head>
<body><div class="stage">
  <div class="item"><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,0.18)">SM</div><div class="lbl">Hairline</div></div>
  <div class="item"><div class="box" style="box-shadow:0 8px 24px rgba(0,0,0,0.18)">MD</div><div class="lbl">Card</div></div>
  <div class="item"><div class="box" style="box-shadow:0 20px 60px rgba(0,0,0,0.22)">LG</div><div class="lbl">Modal</div></div>
  <div class="item"><div class="box" style="box-shadow:0 0 0 1px rgba(238,39,80,0.4), 0 12px 40px rgba(238,39,80,0.35); color:#EE2750">FIRE</div><div class="lbl">Fire Glow</div></div>
  <div class="item"><div class="box" style="box-shadow:0 0 0 1px rgba(0,168,228,0.4), 0 12px 40px rgba(0,168,228,0.32); color:#00A8E4">GLASS</div><div class="lbl">Glass Glow</div></div>
</div></body></html>
