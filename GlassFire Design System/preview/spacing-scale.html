<!doctype html>
<!-- @dsCard group="Brand" name="Spacing Scale" subtitle="4-pt baseline, 1 → 128px" viewport="700x280" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; color: #fff; font-family: var(--font-sans); overflow: hidden; }
  .stage { padding: 22px 32px; box-sizing: border-box; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .tag { width: 28px; font-family: var(--font-mono); font-size: 11px; color: #B8B8BE; }
  .bar { height: 14px; background: linear-gradient(90deg, #EE2750, #00A8E4); border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 10px; color: #6E6E76; }
</style></head>
<body><div class="stage">
  <div class="row"><span class="tag">1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="tag">2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="tag">3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="tag">4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="tag">5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="tag">6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="tag">7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="tag">8</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
  <div class="row"><span class="tag">9</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
  <div class="row"><span class="tag">10</span><div class="bar" style="width:128px"></div><span class="px">128px</span></div>
</div></body></html>
