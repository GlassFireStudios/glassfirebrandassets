<!doctype html>
<!-- @dsCard group="Brand" name="Display Headline" subtitle="Poppins 800, uppercase, tight tracking" viewport="700x240" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; color: #fff; font-family: var(--font-sans); overflow: hidden; }
  .stage { padding: 28px 36px; box-sizing: border-box; }
  .display {
    font-weight: 800; text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.92;
    font-size: 80px;
  }
  .meta { margin-top: 16px; display: flex; gap: 22px; color: #B8B8BE; font-family: var(--font-mono); font-size: 11px; }
  .meta b { color: #fff; font-family: var(--font-sans); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
</style></head>
<body><div class="stage">
  <div class="display">CLARITY<br><span class="gf-text-spark">MEETS SPARK</span></div>
  <div class="meta">
    <span><b>Family</b> Poppins</span>
    <span><b>Weight</b> 800</span>
    <span><b>Tracking</b> −0.02em</span>
    <span><b>Leading</b> 0.92</span>
  </div>
</div></body></html>
