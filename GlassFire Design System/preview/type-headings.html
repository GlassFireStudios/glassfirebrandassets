<!doctype html>
<!-- @dsCard group="Brand" name="Heading Scale" subtitle="H1 / H2 / H3 / Eyebrow" viewport="700x230" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; color: #fff; font-family: var(--font-sans); overflow: hidden; }
  .stage { padding: 22px 32px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 8px; }
  .row:last-child { border-bottom: none; }
  .label { width: 88px; font-family: var(--font-mono); font-size: 11px; color: #B8B8BE; }
  .sample { flex: 1; }
</style></head>
<body><div class="stage">
  <div class="row"><span class="label">H1 / 88px</span><span class="sample" style="font-weight:800;text-transform:uppercase;font-size:48px;line-height:0.94;letter-spacing:-0.02em">CINEMATIC CONTENT</span></div>
  <div class="row"><span class="label">H2 / 48px</span><span class="sample" style="font-weight:800;text-transform:uppercase;font-size:32px;letter-spacing:-0.01em">FULL-SERVICE PRODUCTION</span></div>
  <div class="row"><span class="label">H3 / 28px</span><span class="sample" style="font-weight:700;text-transform:uppercase;font-size:20px;letter-spacing:0.02em">Core Services</span></div>
  <div class="row"><span class="label">Eyebrow</span><span class="sample" style="font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:0.18em;color:#EE2750">Case Study</span></div>
</div></body></html>
