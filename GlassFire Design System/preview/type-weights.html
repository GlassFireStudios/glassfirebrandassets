<!doctype html>
<!-- @dsCard group="Brand" name="Poppins Weights" subtitle="Thin → Black, all nine weights in use" viewport="700x140" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; color: #fff; font-family: var(--font-sans); overflow: hidden; }
  .stage { padding: 22px 32px; box-sizing: border-box; display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; align-items: end; }
  .wt { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .num { font-family: var(--font-mono); font-size: 10px; color: #B8B8BE; }
  .glyph { font-size: 38px; line-height: 1; }
</style></head>
<body><div class="stage">
  <div class="wt"><span class="glyph" style="font-weight:100">Aa</span><span class="num">100</span></div>
  <div class="wt"><span class="glyph" style="font-weight:200">Aa</span><span class="num">200</span></div>
  <div class="wt"><span class="glyph" style="font-weight:300">Aa</span><span class="num">300</span></div>
  <div class="wt"><span class="glyph" style="font-weight:400">Aa</span><span class="num">400</span></div>
  <div class="wt"><span class="glyph" style="font-weight:500">Aa</span><span class="num">500</span></div>
  <div class="wt"><span class="glyph" style="font-weight:600">Aa</span><span class="num">600</span></div>
  <div class="wt"><span class="glyph" style="font-weight:700">Aa</span><span class="num">700</span></div>
  <div class="wt"><span class="glyph" style="font-weight:800">Aa</span><span class="num">800</span></div>
  <div class="wt"><span class="glyph" style="font-weight:900">Aa</span><span class="num">900</span></div>
</div></body></html>
