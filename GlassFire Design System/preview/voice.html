<!doctype html>
<!-- @dsCard group="Brand" name="Voice & Vocabulary" subtitle="Pull quote, traits, signature pair-words" viewport="700x220" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; color: #fff; font-family: var(--font-sans); overflow: hidden; }
  .stage { padding: 28px 36px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; }
  .pull {
    font-weight: 800; text-transform: uppercase; font-size: 28px; line-height: 1; letter-spacing: -0.01em;
  }
  .sub { font-size: 13px; color: #B8B8BE; line-height: 1.5; max-width: 560px; }
  .pair { display: flex; gap: 10px; flex-wrap: wrap; }
  .word { font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.18em; padding: 6px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.16); }
</style></head>
<body><div class="stage">
  <div class="pull">"The technical and the human, <span class="gf-text-spark">the frame and the flame.</span>"</div>
  <div class="sub">Voice traits: confident · cinematic · craft-forward. First-person plural. Display headlines in ALL-CAPS. Sentence-case body. No emoji.</div>
  <div class="pair">
    <span class="word">Clarity</span><span class="word">Spark</span><span class="word">Frame</span><span class="word">Flame</span><span class="word">Clean</span><span class="word">Raw</span>
  </div>
</div></body></html>
